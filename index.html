<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Store Finder</title>

    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f6f8;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            padding: 10px;
            width: 200px;
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            margin-top: 10px;
            cursor: pointer;
        }

        #error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>Store Finder</h1>

    <p>Enter store number</p>

    <input id="storeNumber" placeholder="e.g. 1001">

    <br>

    <button onclick="goToStore()">Go</button>

    <p id="error"></p>

</div>

<script>
function goToStore() {

    const storeNumber = document.getElementById("storeNumber").value.trim();

    const stores = {
        "1001": "stores/1001.html",
        "1002": "stores/1002.html"
    };

    if (stores[storeNumber]) {
        window.location.href = stores[storeNumber];
    } else {
        document.getElementById("error").innerText = "Store not found";
    }
}
</script>

</body>
</html>
